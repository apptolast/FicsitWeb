apiVersion: v1
kind: ServiceAccount
metadata:
  name: ficsitweb-updater
  namespace: ficsitmonitor
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ficsitweb-updater
  namespace: ficsitmonitor
rules:
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments/status"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ficsitweb-updater
  namespace: ficsitmonitor
subjects:
  - kind: ServiceAccount
    name: ficsitweb-updater
    namespace: ficsitmonitor
roleRef:
  kind: Role
  name: ficsitweb-updater
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: ficsitweb-updater
  namespace: ficsitmonitor
  labels:
    app: ficsitweb
    app.kubernetes.io/name: ficsitweb
    app.kubernetes.io/instance: ficsitmonitor
spec:
  schedule: "0 */12 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      template:
        spec:
          serviceAccountName: ficsitweb-updater
          restartPolicy: OnFailure
          containers:
            - name: kubectl
              image: bitnami/kubectl:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  echo "Starting deployment restart at $(date)"
                  kubectl rollout restart deployment/ficsitweb -n ficsitmonitor
                  echo "Waiting for rollout to complete..."
                  kubectl rollout status deployment/ficsitweb -n ficsitmonitor --timeout=5m
                  echo "Deployment restarted successfully at $(date)"
