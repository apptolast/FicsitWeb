apiVersion: apps/v1
kind: Deployment
metadata:
  name: ficsitweb
  namespace: ficsitmonitor
  labels:
    app: ficsitweb
    app.kubernetes.io/name: ficsitweb
    app.kubernetes.io/instance: ficsitmonitor
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: ficsitweb
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: ficsitweb
        app.kubernetes.io/name: ficsitweb
        app.kubernetes.io/instance: ficsitmonitor
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: ficsitweb
          image: docker.io/apptolast/ficsitweb:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
              add:
                - CHOWN
                - SETGID
                - SETUID
                - NET_BIND_SERVICE
