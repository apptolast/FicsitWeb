apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ficsitmonitor-apptolast-com-tls
  namespace: ficsitmonitor
  labels:
    app.kubernetes.io/name: ficsitweb
    app.kubernetes.io/instance: ficsitmonitor
    app.kubernetes.io/component: frontend
spec:
  secretName: ficsitmonitor-apptolast-com-tls
  duration: 2160h
  renewBefore: 720h
  dnsNames:
    - ficsitmonitor.apptolast.com
  issuerRef:
    group: cert-manager.io
    kind: ClusterIssuer
    name: cloudflare-clusterissuer
